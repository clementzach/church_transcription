<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Captions</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --en: #3b82f6;
    --es: #f97316;
    --ht: #22c55e;
    --pt: #a855f7;
    --zh: #ef4444;
    --border: #e5e5e5;
    --bg: #ffffff;
    --text: #111111;
    --header-h: 96px;
    --bar-h: 36px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
  }

  /* ── Header (2 rows) ── */
  #header {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: var(--header-h);
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 6px;
    padding: 8px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    z-index: 10;
  }

  #header-row1, #header-row2 {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  #app-title {
    font-size: 15px;
    font-weight: 600;
    white-space: nowrap;
    flex-shrink: 0;
  }

  /* ── Spoken language (row 2 left) ── */
  .lang-group {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  .lang-group-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: #aaa;
    white-space: nowrap;
  }

  #lang-divider {
    width: 1px;
    height: 22px;
    background: var(--border);
    flex-shrink: 0;
  }

  .lang-btn, .caption-btn {
    padding: 3px 10px;
    border-radius: 6px;
    border: 1.5px solid var(--c);
    background: transparent;
    color: var(--c);
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .lang-btn[data-lang="en"],    .caption-btn[data-lang="en"]    { --c: var(--en); }
  .lang-btn[data-lang="es"],    .caption-btn[data-lang="es"]    { --c: var(--es); }
  .lang-btn[data-lang="ht"],    .caption-btn[data-lang="ht"]    { --c: var(--ht); }
  .lang-btn[data-lang="pt"],    .caption-btn[data-lang="pt"]    { --c: var(--pt); }
  .lang-btn[data-lang="zh"],    .caption-btn[data-lang="zh"]    { --c: var(--zh); }
  .lang-btn.active, .caption-btn.active {
    background: var(--c);
    color: #fff;
  }
  .caption-btn:disabled { opacity: 0.35; cursor: default; }

  /* ── Controls (row 1 right) ── */
  #controls {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  .ctrl-btn {
    padding: 4px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg);
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .ctrl-btn:hover { background: #f5f5f5; }
  .ctrl-btn:disabled { opacity: 0.4; cursor: default; }

  #status-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #aaa;
    flex-shrink: 0;
  }
  #status-dot.live {
    background: #ef4444;
    animation: pulse 1.2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.35; }
  }

  /* ── Session ID & listener link ── */
  #session-info {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
    margin-left: auto;
  }
  #session-id-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: #aaa;
  }
  #session-id-value {
    font-family: monospace;
    font-size: 16px;
    font-weight: 700;
    color: #444;
    letter-spacing: 0.12em;
  }
  #listener-link {
    font-size: 11px;
    color: #999;
    text-decoration: none;
    border: 1px solid #ddd;
    border-radius: 5px;
    padding: 2px 7px;
  }
  #listener-link:hover { background: #f5f5f5; }

  /* ── Grid ── */
  #grid {
    position: fixed;
    top: var(--header-h);
    bottom: var(--bar-h);
    left: 0; right: 0;
    display: grid;
    grid-template-columns: 1fr;
    /* grid-template-rows set dynamically by JS */
    gap: 0;
  }

  .panel {
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: 8px;
    margin: 4px 6px;
    padding: 10px 18px 10px 16px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }
  .panel[data-lang="en"] { --accent: var(--en); }
  .panel[data-lang="es"] { --accent: var(--es); }
  .panel[data-lang="ht"] { --accent: var(--ht); }
  .panel[data-lang="pt"] { --accent: var(--pt); }
  .panel[data-lang="zh"] { --accent: var(--zh); }

  .panel-tag {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.06em;
    color: var(--accent);
    margin-bottom: 6px;
    flex-shrink: 0;
  }

  .panel-lines {
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    flex: 1;
    gap: 4px;
    overflow: hidden;
  }

  .line {
    line-height: 1.35;
    word-break: break-word;
    animation: fadein 0.3s ease;
  }
  @keyframes fadein {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .line-current  { font-size: 28px; font-weight: 500; opacity: 1; }
  .line-prev     { font-size: 18px; opacity: 0.45; }
  .line-older    { font-size: 14px; opacity: 0.20; }
  .line-partial  { font-style: italic; opacity: 0.7; font-size: 28px; color: #555; }

  /* ── Bottom bar ── */
  #bottom-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: var(--bar-h);
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 16px;
    border-top: 1px solid var(--border);
    background: var(--bg);
    z-index: 10;
  }

  #mic-icon {
    font-size: 15px;
    flex-shrink: 0;
    opacity: 0.5;
  }

  #bottom-partial {
    font-size: 12px;
    font-style: italic;
    color: #888;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
    flex: 1;
  }

  /* ── Fullscreen hides header ── */
  :fullscreen #header { display: none; }
  :-webkit-full-screen #header { display: none; }
  :fullscreen #grid { top: 0; }
  :-webkit-full-screen #grid { top: 0; }

  /* ── Hidden header state ── */
  body.header-hidden #header { display: none; }
  body.header-hidden #grid { top: 0; }
</style>
</head>
<body>

<!-- Header -->
<div id="header">

  <!-- Row 1: title, session ID, controls -->
  <div id="header-row1">
    <div id="app-title">Live Captions</div>
    <div id="session-info">
      <span id="session-id-label">Session</span>
      <span id="session-id-value">——————</span>
      <a id="listener-link" href="/church_transcription/listen" target="_blank">Listener ↗</a>
    </div>
    <div id="controls">
      <button class="ctrl-btn" id="start-btn">Start</button>
      <button class="ctrl-btn" id="stop-btn" disabled>Stop</button>
      <button class="ctrl-btn" id="fs-btn">⛶</button>
      <div id="status-dot"></div>
    </div>
  </div>

  <!-- Row 2: spoken language + caption toggles -->
  <div id="header-row2">
    <div class="lang-group">
      <span class="lang-group-label">Spoken</span>
      <div id="lang-toggle">
        <button class="lang-btn active" data-lang="en">EN</button>
        <button class="lang-btn" data-lang="es">ES</button>
        <button class="lang-btn" data-lang="ht">HT</button>
        <button class="lang-btn" data-lang="pt">PT</button>
        <button class="lang-btn" data-lang="zh">ZH</button>
      </div>
    </div>
    <div id="lang-divider"></div>
    <div class="lang-group">
      <span class="lang-group-label">Captions</span>
      <div id="caption-toggle">
        <!-- rendered by JS -->
      </div>
    </div>
  </div>

</div>

<!-- Caption grid -->
<div id="grid">
  <div class="panel" data-lang="en">
    <div class="panel-tag">EN</div>
    <div class="panel-lines" id="lines-en"></div>
  </div>
  <div class="panel" data-lang="es">
    <div class="panel-tag">ES</div>
    <div class="panel-lines" id="lines-es"></div>
  </div>
  <div class="panel" data-lang="ht">
    <div class="panel-tag">HT</div>
    <div class="panel-lines" id="lines-ht"></div>
  </div>
  <div class="panel" data-lang="pt">
    <div class="panel-tag">PT</div>
    <div class="panel-lines" id="lines-pt"></div>
  </div>
  <div class="panel" data-lang="zh">
    <div class="panel-tag">ZH</div>
    <div class="panel-lines" id="lines-zh"></div>
  </div>
</div>

<!-- Bottom bar -->
<div id="bottom-bar">
  <span id="mic-icon">🎙</span>
  <span id="bottom-partial"></span>
  <button class="ctrl-btn" id="hide-btn">Hide controls</button>
</div>

<script>
// ── Constants ──────────────────────────────────────────────────────────────
const ALL_LANGS = ['en', 'es', 'ht', 'pt', 'zh'];
const GLADIA_CONFIG_BASE = {
  encoding: 'wav/pcm',
  sample_rate: 16000,
  bit_depth: 16,
  channels: 1,
  realtime_processing: {
    translation: true,
    translation_config: {
      model: 'base',
      match_original_utterances: true,
      context_adaptation: true,
      context: 'This is a Latter-day Saint (LDS/Mormon) church service. Speakers may reference LDS-specific scripture, theology, and organizational terms. Preserve proper nouns exactly as spoken.'
    }
  },
};

// ── Profanity filter ───────────────────────────────────────────────────────
const _BLOCK_WORDS = [
  'motherfuck', 'cocksucker', 'bullshit', 'asshole', 'asswipe', 'jackass',
  'ass', 'fuck', 'shit', 'bitch', 'cunt', 'cock', 'dick', 'pussy',
  'faggot', 'nigger', 'nigga', 'whore', 'slut', 'butthole', 'prick', 'piss',
].sort((a, b) => b.length - a.length);
const _BLOCK_RE = new RegExp(
  '\\b(' + _BLOCK_WORDS.map(w => w.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')).join('|') + ')\\w*',
  'gi'
);
function filterText(s) { return s.replace(_BLOCK_RE, ' '); }

// ── State ──────────────────────────────────────────────────────────────────
let selectedLang = 'en';
let ws = null;
let audioContext = null;
let scriptProcessor = null;
let sourceNode = null;
let micStream = null;
let isRunning = false;
let reconnectTimer = null;

// Which translation languages are enabled (panels shown, sent to Gladia)
// Persists across source language changes
const translationEnabled = { en: true, es: true, ht: true, pt: true, zh: true };

// Per-panel history and partials
const history  = { en: [], es: [], ht: [], pt: [], zh: [] };
const partials = { en: '', es: '', ht: '', pt: '', zh: '' };

// ── UI refs ────────────────────────────────────────────────────────────────
const startBtn      = document.getElementById('start-btn');
const stopBtn       = document.getElementById('stop-btn');
const fsBtn         = document.getElementById('fs-btn');
const statusDot     = document.getElementById('status-dot');
const bottomPartial = document.getElementById('bottom-partial');
const sessionIdEl   = document.getElementById('session-id-value');

// ── Grid & caption toggles ─────────────────────────────────────────────────
function getActiveLangs() {
  // Source always first, then enabled translations in ALL_LANGS order
  return ALL_LANGS.filter(l => l === selectedLang || (l !== selectedLang && translationEnabled[l]));
}

function updateGrid() {
  const active = getActiveLangs();
  const grid = document.getElementById('grid');
  grid.style.gridTemplateRows = `repeat(${active.length}, 1fr)`;
  ALL_LANGS.forEach(lang => {
    const panel = document.querySelector(`.panel[data-lang="${lang}"]`);
    panel.style.display = active.includes(lang) ? 'flex' : 'none';
  });
}

function renderCaptionToggles() {
  const container = document.getElementById('caption-toggle');
  container.innerHTML = '';
  ALL_LANGS.filter(l => l !== selectedLang).forEach(lang => {
    const btn = document.createElement('button');
    btn.className = 'caption-btn' + (translationEnabled[lang] ? ' active' : '');
    btn.dataset.lang = lang;
    btn.textContent = lang.toUpperCase();
    btn.disabled = isRunning;
    btn.addEventListener('click', () => {
      if (isRunning) return;
      translationEnabled[lang] = !translationEnabled[lang];
      btn.classList.toggle('active', translationEnabled[lang]);
      updateGrid();
    });
    container.appendChild(btn);
  });
}

// ── Language toggle (spoken) ───────────────────────────────────────────────
document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const lang = btn.dataset.lang;
    if (lang === selectedLang || isRunning) return;
    selectedLang = lang;
    document.querySelectorAll('.lang-btn').forEach(b =>
      b.classList.toggle('active', b.dataset.lang === lang)
    );
    renderCaptionToggles();
    updateGrid();
  });
});

// ── Fullscreen ─────────────────────────────────────────────────────────────
fsBtn.addEventListener('click', () => {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(() => {});
  } else {
    document.exitFullscreen().catch(() => {});
  }
});

// ── Hide/show header ───────────────────────────────────────────────────────
const hideBtn = document.getElementById('hide-btn');
hideBtn.addEventListener('click', () => {
  const hidden = document.body.classList.toggle('header-hidden');
  hideBtn.textContent = hidden ? 'Show controls' : 'Hide controls';
});

// ── Start / Stop buttons ───────────────────────────────────────────────────
startBtn.addEventListener('click', startSession);
stopBtn.addEventListener('click', () => stopSession(true));

// ── Render panel ──────────────────────────────────────────────────────────
function renderPanel(lang) {
  const container = document.getElementById('lines-' + lang);
  const h = history[lang];
  const partial = (lang === selectedLang) ? partials[lang] : '';
  const kept = h.slice(-3);
  let html = '';

  kept.forEach((text, i) => {
    const fromEnd = kept.length - 1 - i;
    let cls;
    if (partial) {
      cls = fromEnd === 0 ? 'line line-prev' : 'line line-older';
    } else {
      if (fromEnd === 0)      cls = 'line line-current';
      else if (fromEnd === 1) cls = 'line line-prev';
      else                    cls = 'line line-older';
    }
    html += `<div class="${cls}">${escHtml(text)}</div>`;
  });

  if (partial) {
    html += `<div class="line line-partial">${escHtml(partial)}</div>`;
  }

  container.innerHTML = html;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function commitLine(lang, text) {
  const filtered = filterText(text);
  if (!filtered || !filtered.trim()) return;
  history[lang].push(filtered.trim());
  if (history[lang].length > 3) history[lang].shift();
  partials[lang] = '';
  renderPanel(lang);
}

function setPartial(lang, text) {
  if (lang !== selectedLang) return;
  partials[lang] = filterText(text);
  renderPanel(lang);
  bottomPartial.textContent = partials[lang];
}

function clearPanels() {
  ALL_LANGS.forEach(l => {
    history[l] = [];
    partials[l] = '';
    renderPanel(l);
  });
  bottomPartial.textContent = '';
}

// ── Session management ────────────────────────────────────────────────────
async function startSession() {
  if (isRunning) return;
  clearReconnectTimer();

  const targetLangs = ALL_LANGS.filter(l => l !== selectedLang && translationEnabled[l]);
  const config = JSON.parse(JSON.stringify(GLADIA_CONFIG_BASE));
  config.language_config = { languages: [selectedLang], code_switching: false };
  config.realtime_processing.translation_config.target_languages = targetLangs;

  let gladiaWsUrl;
  try {
    const resp = await fetch('/church_transcription/init-session', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(config)
    });
    if (!resp.ok) {
      const text = await resp.text();
      throw new Error(`Init session failed (${resp.status}): ${text}`);
    }
    const data = await resp.json();
    gladiaWsUrl = data.url || data.websocket_url || data.ws_url;
    if (!gladiaWsUrl) throw new Error('No WebSocket URL in response: ' + JSON.stringify(data));
    if (data.session_id) sessionIdEl.textContent = data.session_id;
  } catch (err) {
    alert('Failed to start session: ' + err.message);
    return;
  }

  try {
    micStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
  } catch (err) {
    alert('Microphone access denied: ' + err.message);
    return;
  }

  isRunning = true;
  startBtn.disabled = true;
  stopBtn.disabled = false;
  statusDot.classList.add('live');
  // Disable config controls while running
  document.querySelectorAll('.lang-btn').forEach(b => b.disabled = true);
  renderCaptionToggles(); // re-renders with disabled=true
  clearPanels();

  const wsProto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${wsProto}//${location.host}/church_transcription/stream`);
  ws.binaryType = 'arraybuffer';

  ws.addEventListener('open', () => {
    ws.send(gladiaWsUrl);
    startAudio();
  });

  ws.addEventListener('message', (evt) => {
    if (typeof evt.data !== 'string') return;
    let msg;
    try { msg = JSON.parse(evt.data); } catch { return; }
    handleGladiaMessage(msg);
  });

  ws.addEventListener('close', (evt) => {
    if (!isRunning) return;
    if (evt.code !== 1000) scheduleReconnect();
  });

  ws.addEventListener('error', () => {
    if (isRunning) scheduleReconnect();
  });
}

async function stopSession(userInitiated = true) {
  isRunning = false;
  clearReconnectTimer();

  if (ws && ws.readyState === WebSocket.OPEN) {
    try { ws.send(JSON.stringify({ type: 'stop_recording' })); } catch (_) {}
    setTimeout(() => { try { ws.close(1000); } catch (_) {} }, 200);
  }
  ws = null;
  stopAudio();

  if (userInitiated) {
    startBtn.disabled = false;
    stopBtn.disabled = true;
    statusDot.classList.remove('live');
    bottomPartial.textContent = '';
    // Re-enable config controls
    document.querySelectorAll('.lang-btn').forEach(b => b.disabled = false);
    renderCaptionToggles();
  }
}

function scheduleReconnect() {
  clearReconnectTimer();
  stopAudio();
  if (ws) { try { ws.close(); } catch (_) {} ws = null; }
  reconnectTimer = setTimeout(() => {
    if (!isRunning) return;
    isRunning = false;
    startSession();
  }, 1000);
}

function clearReconnectTimer() {
  if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
}

// ── Audio capture ─────────────────────────────────────────────────────────
function startAudio() {
  const TARGET_SR = 16000;
  audioContext = new AudioContext({ sampleRate: TARGET_SR });
  sourceNode = audioContext.createMediaStreamSource(micStream);
  scriptProcessor = audioContext.createScriptProcessor(4096, 1, 1);

  scriptProcessor.onaudioprocess = (event) => {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    const float32 = event.inputBuffer.getChannelData(0);
    ws.send(float32ToInt16(float32).buffer);
  };

  sourceNode.connect(scriptProcessor);
  scriptProcessor.connect(audioContext.destination);
}

function stopAudio() {
  if (scriptProcessor) { scriptProcessor.disconnect(); scriptProcessor = null; }
  if (sourceNode)      { sourceNode.disconnect(); sourceNode = null; }
  if (audioContext)    { audioContext.close().catch(() => {}); audioContext = null; }
  if (micStream)       { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
}

function float32ToInt16(float32) {
  const int16 = new Int16Array(float32.length);
  for (let i = 0; i < float32.length; i++) {
    const s = Math.max(-1, Math.min(1, float32[i]));
    int16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
  }
  return int16;
}

// ── Gladia message routing ────────────────────────────────────────────────
function handleGladiaMessage(msg) {
  const type = msg.type;

  if (type === 'transcript') {
    const utterance = (msg.data || {}).utterance || {};
    const text = utterance.text || '';
    const isFinal = utterance.is_final === true || (msg.data || {}).is_final === true;
    if (isFinal) {
      commitLine(selectedLang, text);
      bottomPartial.textContent = '';
    } else {
      setPartial(selectedLang, text);
    }
    return;
  }

  if (type === 'translation') {
    const data = msg.data || {};
    const lang = (data.target_language || '').toLowerCase();
    const text = (data.translated_utterance || {}).text || '';
    if (ALL_LANGS.includes(lang) && lang !== selectedLang && text) {
      commitLine(lang, text);
    }
    return;
  }
}

// ── Init ──────────────────────────────────────────────────────────────────
renderCaptionToggles();
updateGrid();
</script>
</body>
</html>

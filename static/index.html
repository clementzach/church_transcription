<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Captions</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --auto: #6b7280;
    --en: #3b82f6;
    --es: #f97316;
    --ht: #22c55e;
    --pt: #a855f7;
    --zh: #06b6d4;
    --border: #e5e5e5;
    --bg: #ffffff;
    --text: #111111;
    --header-h: 88px;
    --bar-h: 36px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
  }

  /* ── Header ── */
  #header {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: var(--header-h);
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 16px;
    padding: 0 20px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    z-index: 10;
  }

  #header-left {
    display: flex;
    align-items: center;
    gap: 16px;
    flex: 1;
  }

  #header-right {
    display: flex;
    flex-direction: column;
    gap: 6px;
    align-items: flex-end;
    flex-shrink: 0;
  }

  .toggle-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .toggle-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.05em;
    color: #999;
    text-transform: uppercase;
    white-space: nowrap;
  }

  #panel-toggle {
    display: flex;
    gap: 6px;
  }

  .panel-vis-btn {
    padding: 4px 12px;
    border-radius: 6px;
    border: 1.5px solid var(--c);
    background: var(--c);
    color: #fff;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, color 0.15s, opacity 0.15s;
  }
  .panel-vis-btn[data-lang="en"] { --c: var(--en); }
  .panel-vis-btn[data-lang="es"] { --c: var(--es); }
  .panel-vis-btn[data-lang="ht"] { --c: var(--ht); }
  .panel-vis-btn[data-lang="pt"] { --c: var(--pt); }
  .panel-vis-btn[data-lang="zh"] { --c: var(--zh); }
  .panel-vis-btn.hidden-panel {
    background: transparent;
    color: var(--c);
    opacity: 0.5;
  }

  #app-title {
    font-size: 15px;
    font-weight: 600;
    white-space: nowrap;
    flex-shrink: 0;
  }

  #lang-toggle {
    display: flex;
    gap: 6px;
  }

  .lang-btn {
    padding: 4px 12px;
    border-radius: 6px;
    border: 1.5px solid var(--c);
    background: transparent;
    color: var(--c);
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .lang-btn[data-lang="auto"] { --c: var(--auto); }
  .lang-btn[data-lang="en"] { --c: var(--en); }
  .lang-btn[data-lang="es"] { --c: var(--es); }
  .lang-btn[data-lang="ht"] { --c: var(--ht); }
  .lang-btn[data-lang="pt"] { --c: var(--pt); }
  .lang-btn[data-lang="zh"] { --c: var(--zh); }
  .lang-btn.active {
    background: var(--c);
    color: #fff;
  }

  #controls {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

.ctrl-btn {
    padding: 4px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg);
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .ctrl-btn:hover { background: #f5f5f5; }
  .ctrl-btn:disabled { opacity: 0.4; cursor: default; }

  #status-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #aaa;
    flex-shrink: 0;
  }
  #status-dot.live {
    background: #ef4444;
    animation: pulse 1.2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.35; }
  }

  /* ── Grid ── */
  #grid {
    position: fixed;
    top: var(--header-h);
    bottom: var(--bar-h);
    left: 0; right: 0;
    display: grid;
    grid-template-columns: 1fr;
    grid-template-rows: repeat(5, 1fr);
    gap: 0;
  }

  .panel {
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: 8px;
    margin: 6px;
    padding: 14px 18px 14px 16px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }
  .panel[data-lang="en"] { --accent: var(--en); }
  .panel[data-lang="es"] { --accent: var(--es); }
  .panel[data-lang="ht"] { --accent: var(--ht); }
  .panel[data-lang="pt"] { --accent: var(--pt); }
  .panel[data-lang="zh"] { --accent: var(--zh); }

  .panel-tag {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.06em;
    color: var(--accent);
    margin-bottom: 10px;
    flex-shrink: 0;
  }

  .panel-lines {
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    flex: 1;
    gap: 6px;
    overflow: hidden;
  }

  .line {
    line-height: 1.35;
    word-break: break-word;
    animation: fadein 0.3s ease;
  }
  @keyframes fadein {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .line-current  { font-size: 28px; font-weight: 500; opacity: 1; }
  .line-prev     { font-size: 18px; opacity: 0.45; }
  .line-older    { font-size: 14px; opacity: 0.20; }
  .line-partial  { font-style: italic; opacity: 0.7; font-size: 28px; color: #555; }

  /* ── Bottom bar ── */
  #bottom-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: var(--bar-h);
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 16px;
    border-top: 1px solid var(--border);
    background: var(--bg);
    z-index: 10;
  }

  #mic-icon {
    font-size: 15px;
    flex-shrink: 0;
    opacity: 0.5;
  }

  #bottom-partial {
    font-size: 12px;
    font-style: italic;
    color: #888;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
    flex: 1;
  }


  /* ── Fullscreen hides header ── */
  :fullscreen #header { display: none; }
  :-webkit-full-screen #header { display: none; }

  :fullscreen #grid { top: 0; }
  :-webkit-full-screen #grid { top: 0; }

  /* ── Hidden header state ── */
  body.header-hidden #header { display: none; }
  body.header-hidden #grid { top: 0; }

  /* ── Session ID ── */
  #session-info {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
    font-size: 12px;
    color: #999;
  }
  #session-id-label {
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    font-size: 10px;
  }
  #session-id-value {
    font-family: monospace;
    font-size: 16px;
    font-weight: 700;
    color: #444;
    letter-spacing: 0.12em;
  }
  #listener-link {
    font-size: 11px;
    color: #999;
    text-decoration: none;
    border: 1px solid #ddd;
    border-radius: 5px;
    padding: 2px 7px;
  }
  #listener-link:hover { background: #f5f5f5; }
</style>
</head>
<body>

<!-- Header -->
<div id="header">
  <div id="header-left">
    <div id="app-title">Live Captions</div>

    <div id="session-info">
      <span id="session-id-label">Session</span>
      <span id="session-id-value">——————</span>
      <a id="listener-link" href="/church_transcription/listen" target="_blank">Listener ↗</a>
    </div>

    <div id="controls">
      <button class="ctrl-btn" id="start-btn">Start</button>
      <button class="ctrl-btn" id="stop-btn" disabled>Stop</button>
      <button class="ctrl-btn" id="fs-btn">⛶</button>
      <div id="status-dot"></div>
    </div>
  </div>

  <div id="header-right">
    <div class="toggle-row">
      <span class="toggle-label">Spoken language</span>
      <div id="lang-toggle">
        <button class="lang-btn active" data-lang="auto">AUTO</button>
        <button class="lang-btn" data-lang="en">EN</button>
        <button class="lang-btn" data-lang="es">ES</button>
        <button class="lang-btn" data-lang="ht">HT</button>
        <button class="lang-btn" data-lang="pt">PT</button>
        <button class="lang-btn" data-lang="zh">ZH</button>
      </div>
    </div>
    <div class="toggle-row">
      <span class="toggle-label">Show panels</span>
      <div id="panel-toggle">
        <button class="panel-vis-btn" data-lang="en">EN</button>
        <button class="panel-vis-btn" data-lang="es">ES</button>
        <button class="panel-vis-btn" data-lang="ht">HT</button>
        <button class="panel-vis-btn" data-lang="pt">PT</button>
        <button class="panel-vis-btn" data-lang="zh">ZH</button>
      </div>
    </div>
  </div>
</div>

<!-- Caption grid -->
<div id="grid">
  <div class="panel" data-lang="en">
    <div class="panel-tag">EN</div>
    <div class="panel-lines" id="lines-en"></div>
  </div>
  <div class="panel" data-lang="es">
    <div class="panel-tag">ES</div>
    <div class="panel-lines" id="lines-es"></div>
  </div>
  <div class="panel" data-lang="ht">
    <div class="panel-tag">HT</div>
    <div class="panel-lines" id="lines-ht"></div>
  </div>
  <div class="panel" data-lang="pt">
    <div class="panel-tag">PT</div>
    <div class="panel-lines" id="lines-pt"></div>
  </div>
  <div class="panel" data-lang="zh">
    <div class="panel-tag">ZH</div>
    <div class="panel-lines" id="lines-zh"></div>
  </div>
</div>

<!-- Bottom bar -->
<div id="bottom-bar">
  <span id="mic-icon">🎙</span>
  <span id="bottom-partial"></span>
  <button class="ctrl-btn" id="hide-btn">Hide controls</button>
</div>

<script>
// ── Constants ──────────────────────────────────────────────────────────────
const ALL_LANGS = ['en', 'es', 'ht', 'pt', 'zh'];
const TRANSLATION_LANGS = ['es', 'ht', 'pt', 'zh']; // non-English target languages
const GLADIA_CONFIG_BASE = {
  encoding: 'wav/pcm',
  sample_rate: 16000,
  bit_depth: 16,
  channels: 1,
  realtime_processing: {
    translation: true,
    translation_config: {
      model: 'enhanced',
      lipsync: false,
      match_original_utterances: false,
      context_adaptation: true,
      context: 'This is a Latter-day Saint (LDS/Mormon) church service. Speakers may reference LDS-specific scripture, theology, and organizational terms. Preserve proper nouns exactly as spoken.'
    }
  },
};

// ── State ──────────────────────────────────────────────────────────────────
let selectedLang = 'auto';
let detectedSourceLang = 'en'; // updated from Gladia transcript messages in auto mode
let currentSessionId = null;
let ws = null;
let mediaRecorder = null;
let audioContext = null;
let scriptProcessor = null;
let sourceNode = null;
let micStream = null;
let isRunning = false;
let reconnectTimer = null;

// Per-panel history: array of up to 3 committed lines
const history = { en: [], es: [], ht: [], pt: [], zh: [] };
// Current partial text per panel (only source panel uses it)
const partials = { en: '', es: '', ht: '', pt: '', zh: '' };

// ── UI refs ────────────────────────────────────────────────────────────────
const startBtn      = document.getElementById('start-btn');
const stopBtn       = document.getElementById('stop-btn');
const fsBtn         = document.getElementById('fs-btn');
const statusDot     = document.getElementById('status-dot');
const bottomPartial = document.getElementById('bottom-partial');
const sessionIdEl   = document.getElementById('session-id-value');

// ── Language toggle ────────────────────────────────────────────────────────
document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const lang = btn.dataset.lang;
    if (lang === selectedLang) return;
    selectedLang = lang;
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));

    if (isRunning) {
      // Silent reconnect
      stopSession(false).then(() => startSession());
    }
  });
});

// ── Fullscreen ─────────────────────────────────────────────────────────────
fsBtn.addEventListener('click', () => {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(() => {});
  } else {
    document.exitFullscreen().catch(() => {});
  }
});

// ── Hide/show header ───────────────────────────────────────────────────────
const hideBtn = document.getElementById('hide-btn');
hideBtn.addEventListener('click', () => {
  const hidden = document.body.classList.toggle('header-hidden');
  hideBtn.textContent = hidden ? 'Show controls' : 'Hide controls';
});

// ── Start / Stop buttons ───────────────────────────────────────────────────
startBtn.addEventListener('click', startSession);
stopBtn.addEventListener('click', () => stopSession(true));

// ── Render panel ──────────────────────────────────────────────────────────
function renderPanel(lang) {
  const container = document.getElementById('lines-' + lang);
  const h = history[lang];
  const srcLang = selectedLang === 'auto' ? detectedSourceLang : selectedLang;
  const partial = (lang === srcLang) ? partials[lang] : '';
  const lines = [];

  // Build from oldest to newest (max 3 committed)
  const kept = h.slice(-3);
  kept.forEach((text, i) => {
    const fromEnd = kept.length - 1 - i; // 0 = newest committed
    lines.push({ text, fromEnd });
  });

  let html = '';

  // Older committed lines
  lines.forEach(({ text, fromEnd }) => {
    let cls;
    if (partial) {
      // partial is "current" so committed lines shift
      if (fromEnd === 0) cls = 'line line-prev';
      else               cls = 'line line-older';
    } else {
      if (fromEnd === 0) cls = 'line line-current';
      else if (fromEnd === 1) cls = 'line line-prev';
      else               cls = 'line line-older';
    }
    html += `<div class="${cls}">${escHtml(text)}</div>`;
  });

  if (partial) {
    html += `<div class="line line-partial">${escHtml(partial)}</div>`;
  }

  container.innerHTML = html;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function commitLine(lang, text) {
  if (!text || !text.trim()) return;
  history[lang].push(text.trim());
  if (history[lang].length > 3) history[lang].shift();
  partials[lang] = '';
  renderPanel(lang);
}

function setPartial(lang, text) {
  const srcLang = selectedLang === 'auto' ? detectedSourceLang : selectedLang;
  if (lang !== srcLang) return; // no partials on translation panels
  partials[lang] = text;
  renderPanel(lang);
  bottomPartial.textContent = text;
}

function clearPanels() {
  detectedSourceLang = 'en';
  ALL_LANGS.forEach(l => {
    history[l] = [];
    partials[l] = '';
    renderPanel(l);
  });
  bottomPartial.textContent = '';
}

// ── Session management ────────────────────────────────────────────────────
async function startSession() {
  if (isRunning) return;

  clearReconnectTimer();

  // Build config
  const config = JSON.parse(JSON.stringify(GLADIA_CONFIG_BASE));
  if (selectedLang === 'auto') {
    config.language_config = { languages: ALL_LANGS.slice(), code_switching: true };
    config.realtime_processing.translation_config.target_languages = ALL_LANGS.slice();
  } else {
    config.language_config = { languages: [selectedLang], code_switching: false };
    config.realtime_processing.translation_config.target_languages = ALL_LANGS.filter(l => l !== selectedLang);
  }

  // Init session with Gladia
  let gladiaWsUrl;
  try {
    const resp = await fetch('/church_transcription/init-session', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
      },
      body: JSON.stringify(config)
    });
    if (!resp.ok) {
      const text = await resp.text();
      throw new Error(`Init session failed (${resp.status}): ${text}`);
    }
    const data = await resp.json();
    gladiaWsUrl = data.url || data.websocket_url || data.ws_url;
    if (!gladiaWsUrl) throw new Error('No WebSocket URL in response: ' + JSON.stringify(data));
    if (data.session_id) { currentSessionId = data.session_id; sessionIdEl.textContent = data.session_id; }
  } catch (err) {
    alert('Failed to start session: ' + err.message);
    return;
  }

  // Get mic
  try {
    micStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
  } catch (err) {
    alert('Microphone access denied: ' + err.message);
    return;
  }

  isRunning = true;
  startBtn.disabled = true;
  stopBtn.disabled = false;
  statusDot.classList.add('live');
  clearPanels();

  // Open backend WebSocket
  const wsProto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${wsProto}//${location.host}/church_transcription/stream`);
  ws.binaryType = 'arraybuffer';

  ws.addEventListener('open', async () => {
    console.log('[ws] Backend WebSocket open');
    ws.send(JSON.stringify({ url: gladiaWsUrl, session_id: currentSessionId }));
    await startAudio();
  });

  ws.addEventListener('message', (evt) => {
    if (typeof evt.data !== 'string') return;
    let msg;
    try { msg = JSON.parse(evt.data); } catch { return; }
    handleGladiaMessage(msg);
  });

  ws.addEventListener('close', (evt) => {
    console.warn('[ws] Backend WebSocket closed', evt.code, evt.reason);
    if (!isRunning) return;
    if (evt.code !== 1000) {
      scheduleReconnect();
    }
  });

  ws.addEventListener('error', (evt) => {
    console.error('[ws] Backend WebSocket error', evt);
    if (isRunning) scheduleReconnect();
  });
}

async function stopSession(userInitiated = true) {
  isRunning = false;
  clearReconnectTimer();

  // Send terminate to Gladia via ws
  if (ws && ws.readyState === WebSocket.OPEN) {
    try {
      ws.send(JSON.stringify({ type: 'stop_recording' }));
    } catch (_) {}
    setTimeout(() => { try { ws.close(1000); } catch (_) {} }, 200);
  }
  ws = null;

  stopAudio();

  if (userInitiated) {
    startBtn.disabled = false;
    stopBtn.disabled = true;
    statusDot.classList.remove('live');
    bottomPartial.textContent = '';
  }
}

function scheduleReconnect() {
  clearReconnectTimer();
  stopAudio();
  if (ws) { try { ws.close(); } catch (_) {} ws = null; }
  reconnectTimer = setTimeout(() => {
    if (!isRunning) return;
    isRunning = false; // reset so startSession can proceed
    startSession();
  }, 1000);
}

function clearReconnectTimer() {
  if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
}

// ── Audio capture ─────────────────────────────────────────────────────────
async function startAudio() {
  const TARGET_SR = 16000;
  audioContext = new AudioContext({ sampleRate: TARGET_SR });
  if (audioContext.state === 'suspended') {
    await audioContext.resume();
  }
  console.log('[audio] AudioContext state:', audioContext.state, 'sampleRate:', audioContext.sampleRate);
  sourceNode = audioContext.createMediaStreamSource(micStream);

  // 4096 samples @ 16kHz ≈ 256ms chunks
  scriptProcessor = audioContext.createScriptProcessor(4096, 1, 1);

  scriptProcessor.onaudioprocess = (event) => {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    const float32 = event.inputBuffer.getChannelData(0);
    const int16 = float32ToInt16(float32);
    // Prepend WAV header for first chunk, or send raw PCM
    // Gladia wav/pcm encoding expects raw PCM 16-bit little-endian
    ws.send(int16.buffer);
  };

  sourceNode.connect(scriptProcessor);
  scriptProcessor.connect(audioContext.destination);
}

function stopAudio() {
  if (scriptProcessor) { scriptProcessor.disconnect(); scriptProcessor = null; }
  if (sourceNode)      { sourceNode.disconnect(); sourceNode = null; }
  if (audioContext)    { audioContext.close().catch(() => {}); audioContext = null; }
  if (micStream)       { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
}

function float32ToInt16(float32) {
  const int16 = new Int16Array(float32.length);
  for (let i = 0; i < float32.length; i++) {
    const s = Math.max(-1, Math.min(1, float32[i]));
    int16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
  }
  return int16;
}

// ── Gladia message routing ────────────────────────────────────────────────
function handleGladiaMessage(msg) {
  const type = msg.type;

  if (type === 'transcript') {
    const data = msg.data || {};
    const utterance = data.utterance || {};
    const text = utterance.text || '';
    const isFinal = utterance.is_final === true || data.is_final === true;

    if (selectedLang === 'auto' && utterance.language) {
      detectedSourceLang = utterance.language.toLowerCase();
    }
    const routeLang = selectedLang === 'auto' ? detectedSourceLang : selectedLang;

    if (isFinal) {
      commitLine(routeLang, text);
      bottomPartial.textContent = '';
    } else {
      setPartial(routeLang, text);
    }
    return;
  }

  if (type === 'translation') {
    const data = msg.data || {};
    const lang = (data.target_language || '').toLowerCase();
    const text = (data.translated_utterance || {}).text || '';
    const srcLang = selectedLang === 'auto' ? detectedSourceLang : selectedLang;
    if (ALL_LANGS.includes(lang) && lang !== srcLang && text) {
      commitLine(lang, text);
    }
    return;
  }

}

// ── Panel visibility ──────────────────────────────────────────────────────
const visiblePanels = new Set(ALL_LANGS);

function updateGridLayout() {
  const count = visiblePanels.size || 1;
  document.getElementById('grid').style.gridTemplateRows = `repeat(${count}, 1fr)`;
  ALL_LANGS.forEach(lang => {
    const panel = document.querySelector(`.panel[data-lang="${lang}"]`);
    if (panel) panel.style.display = visiblePanels.has(lang) ? '' : 'none';
  });
}

document.querySelectorAll('.panel-vis-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const lang = btn.dataset.lang;
    if (visiblePanels.has(lang)) {
      if (visiblePanels.size === 1) return; // keep at least one panel
      visiblePanels.delete(lang);
      btn.classList.add('hidden-panel');
    } else {
      visiblePanels.add(lang);
      btn.classList.remove('hidden-panel');
    }
    updateGridLayout();
  });
});

// ── Init render ───────────────────────────────────────────────────────────
ALL_LANGS.forEach(renderPanel);
updateGridLayout();
